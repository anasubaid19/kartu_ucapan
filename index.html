<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Kartu Lebaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Konfigurasi Tailwind untuk Dark Mode berbasis class
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
        
        // Cek preferensi tema sebelumnya agar tidak berkedip saat dimuat
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        /* Smooth color transition for dark/light mode */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        #renderCanvas {
            display: none; /* Disembunyikan, hanya untuk proses gambar di latar belakang */
        }
        /* Custom styling untuk thumbnail aktif */
        .thumb-active {
            box-shadow: 0 0 0 3px #10b981; /* Emerald 500 */
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 flex flex-col">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 w-full backdrop-blur-md bg-white/80 dark:bg-slate-950/80 border-b border-slate-200 dark:border-slate-800 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center shadow-emerald-600/20 shadow-lg">
                        <i data-lucide="pen-tool" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="font-serif font-bold text-xl tracking-wide text-slate-900 dark:text-white">Kartu<span class="text-emerald-600">Ucapan</span></span>
                </div>
                <!-- Theme Toggle Button -->
                <button id="themeToggle" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <i data-lucide="moon" id="moonIcon" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="sun" id="sunIcon" class="w-5 h-5 block dark:hidden"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Dual-Pane -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-8 flex flex-col lg:grid lg:grid-cols-12 gap-8 lg:gap-12 items-start pb-28 lg:pb-8">
        
        <!-- PANEL KIRI: EDITOR (Tools) -->
        <div class="w-full lg:col-span-5 flex flex-col gap-6 order-2 lg:order-1">
            
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-5 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                <h2 class="text-lg font-semibold flex items-center mb-6 text-slate-900 dark:text-white">
                    <i data-lucide="layout-template" class="w-5 h-5 mr-2.5 text-emerald-600"></i> Pilih Desain
                </h2>
                <!-- Thumbnail Gallery -->
                <div class="flex gap-4 overflow-x-auto hide-scrollbar pb-2" id="thumbnailContainer">
                    <!-- Thumbnail akan digenerate oleh JavaScript -->
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                <h2 class="text-lg font-semibold flex items-center mb-6 text-slate-900 dark:text-white">
                    <i data-lucide="type" class="w-5 h-5 mr-2.5 text-emerald-600"></i> Personalisasi Teks
                </h2>
                <!-- Form Input -->
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">Nama Pengirim Utama</label>
                        <input type="text" id="inputNamaUtama" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white px-4 py-3.5 rounded-xl text-base font-semibold placeholder-slate-400 dark:placeholder-slate-600 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="Nama">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">Teks Pendukung / Keluarga</label>
                        <input type="text" id="inputNamaSekunder" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white px-4 py-3.5 rounded-xl text-base placeholder-slate-400 dark:placeholder-slate-600 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="Keterangan">
                    </div>
                </div>
            </div>

        </div>

        <!-- PANEL KANAN: PREVIEW (Canvas) -->
        <div class="w-full lg:col-span-7 flex flex-col items-center relative lg:sticky lg:top-24 order-1 lg:order-2">
            
            <div class="w-full flex justify-between items-center mb-4 px-1 lg:px-2">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 mr-2 animate-pulse"></span> Pratinjau Langsung
                </span>
                <!-- Tombol Unduh Desktop -->
                <button onclick="unduhGambar()" class="hidden lg:flex bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold py-2.5 px-5 rounded-lg shadow-md transition-all items-center">
                    <i data-lucide="download" class="w-4 h-4 mr-2"></i> Unduh File
                </button>
            </div>

            <div class="relative w-full max-w-sm sm:max-w-md lg:max-w-[500px] aspect-square rounded-3xl lg:rounded-[2rem] overflow-hidden bg-slate-200 dark:bg-slate-800 border-4 lg:border-8 border-white dark:border-slate-900 shadow-xl lg:shadow-2xl transition-all">
                
                <!-- Loading Indicator -->
                <div id="loadingIndicator" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm hidden transition-all">
                    <i data-lucide="loader-circle" class="w-10 h-10 text-emerald-600 animate-spin mb-3"></i>
                    <span class="text-sm font-medium text-slate-600 dark:text-slate-300">Menyusun gambar...</span>
                </div>
                
                <!-- Gambar Hasil Komposisi -->
                <img id="previewImage" src="" alt="Preview Kartu" class="w-full h-full object-cover transition-opacity duration-300">
                <canvas id="renderCanvas"></canvas>

            </div>
            
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-5 text-center max-w-sm hidden lg:block">
                Desain Anda tidak diunggah ke server. Semua proses dilakukan secara aman di dalam perangkat Anda.
            </p>
        </div>

    </main>

    <!-- Mobile Fixed Action Bar -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 dark:bg-slate-950/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 lg:hidden z-50 transition-colors">
        <button onclick="unduhGambar()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-emerald-600/20 transition-all flex items-center justify-center">
            <i data-lucide="download" class="w-5 h-5 mr-2"></i> Simpan Gambar ke HP
        </button>
    </div>

    <script>
        // Inisialisasi Icon
        lucide.createIcons();

        // ---------------------------------------------------------
        // LOGIKA THEME TOGGLE (LIGHT / DARK MODE)
        // ---------------------------------------------------------
        const themeToggleBtn = document.getElementById('themeToggle');
        
        themeToggleBtn.addEventListener('click', () => {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });

        // ---------------------------------------------------------
        // KONFIGURASI TEMPLAT (Koordinat Teks per Gambar)
        // ---------------------------------------------------------
        const templates = [
            { 
                id: 1, 
                file: '1.png', 
                namaUtama_posY: 0.81, 
                namaSekunder_posY: 0.865, 
                color: '#0f3d3e' // Dark Teal (Senada dengan gambar 1)
            },
            { 
                id: 2, 
                file: '2.png', 
                namaUtama_posY: 0.825, 
                namaSekunder_posY: 0.88, 
                color: '#1e3a8a' // Dark Blue (Senada dengan gambar 2)
            },
            { 
                id: 3, 
                file: '3.png', 
                namaUtama_posY: 0.805, 
                namaSekunder_posY: 0.86, 
                color: '#1e293b' // Slate Dark (Senada dengan gambar 3)
            }
        ];

        // ---------------------------------------------------------
        // INISIALISASI VARIABEL & DOM
        // ---------------------------------------------------------
        let activeTemplateId = 1;
        const thumbnailContainer = document.getElementById('thumbnailContainer');
        const inputNamaUtama = document.getElementById('inputNamaUtama');
        const inputNamaSekunder = document.getElementById('inputNamaSekunder');
        const previewImage = document.getElementById('previewImage');
        const renderCanvas = document.getElementById('renderCanvas');
        const ctx = renderCanvas.getContext('2d');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Render otomatis saat user mengetik
        inputNamaUtama.addEventListener('input', () => prosesRender());
        inputNamaSekunder.addEventListener('input', () => prosesRender());

        // ---------------------------------------------------------
        // RENDER UI THUMBNAILS
        // ---------------------------------------------------------
        function renderThumbnails() {
            thumbnailContainer.innerHTML = '';
            templates.forEach(tpl => {
                const isSelected = tpl.id === activeTemplateId;
                
                const wrapper = document.createElement('div');
                wrapper.className = `relative flex-shrink-0 cursor-pointer transition-all duration-300 rounded-xl ${isSelected ? 'thumb-active' : 'opacity-60 hover:opacity-100 hover:scale-105'}`;
                wrapper.onclick = () => {
                    activeTemplateId = tpl.id;
                    renderThumbnails(); 
                    prosesRender();     
                };

                const img = document.createElement('img');
                img.src = tpl.file;
                img.className = `w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 object-cover rounded-xl bg-slate-200 dark:bg-slate-800`;
                
                // Fallback jika file gambar tidak ditemukan
                img.onerror = function() {
                    this.src = buatGambarFallback(tpl.id);
                };

                wrapper.appendChild(img);
                thumbnailContainer.appendChild(wrapper);
            });
        }

        // ---------------------------------------------------------
        // PROSES RENDER CANVAS
        // ---------------------------------------------------------
        function prosesRender() {
            loadingIndicator.classList.remove('hidden');
            previewImage.style.opacity = '0.3';

            const activeConfig = templates.find(t => t.id === activeTemplateId);
            const img = new Image();
            img.crossOrigin = "Anonymous";
            
            img.onload = () => {
                renderCanvas.width = img.width;
                renderCanvas.height = img.height;
                const cw = renderCanvas.width;
                const ch = renderCanvas.height;

                ctx.clearRect(0, 0, cw, ch);
                ctx.drawImage(img, 0, 0, cw, ch);

                ctx.textAlign = 'center';
                ctx.fillStyle = activeConfig.color;

                const txtUtama = inputNamaUtama.value.trim();
                const txtSekunder = inputNamaSekunder.value.trim();

                // Hanya gambar teks UTAMA jika tidak kosong
                if (txtUtama) {
                    const sizeUtama = Math.floor(cw * 0.08); 
                    ctx.font = `bold ${sizeUtama}px "Playfair Display", serif`;
                    ctx.textBaseline = 'middle';
                    const yUtama = ch * activeConfig.namaUtama_posY;
                    ctx.fillText(txtUtama, cw / 2, yUtama);
                }

                // Hanya gambar teks SEKUNDER jika tidak kosong
                if (txtSekunder) {
                    const sizeSekunder = Math.floor(cw * 0.035);
                    ctx.font = `500 ${sizeSekunder}px "Inter", sans-serif`;
                    const ySekunder = ch * activeConfig.namaSekunder_posY;
                    ctx.fillText(txtSekunder, cw / 2, ySekunder);
                }

                previewImage.src = renderCanvas.toDataURL('image/png');
                
                loadingIndicator.classList.add('hidden');
                previewImage.style.opacity = '1';
            };

            img.onerror = () => {
                img.src = buatGambarFallback(activeConfig.id);
            };

            img.src = activeConfig.file;
        }

        // ---------------------------------------------------------
        // FUNGSI DOWNLOAD
        // ---------------------------------------------------------
        function unduhGambar() {
            try {
                renderCanvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const namaFile = inputNamaUtama.value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'kartu';
                    link.download = `Studio_Lebaran_${namaFile}.png`;
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 'image/png');
            } catch (err) {
                alert("Silakan ketuk dan tahan gambar untuk menyimpan secara manual.");
            }
        }

        // ---------------------------------------------------------
        // FUNGSI FALLBACK IMAGE (Hanya jalan jika file asli tidak ada)
        // ---------------------------------------------------------
        function buatGambarFallback(id) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 1080;
            tempCanvas.height = 1440; // Menyesuaikan rasio 3:4 yang umum
            const tCtx = tempCanvas.getContext('2d');
            
            const hue = (id * 45) % 360;
            tCtx.fillStyle = `hsl(${hue}, 15%, 85%)`; // Background terang
            tCtx.fillRect(0,0, 1080, 1440);
            
            tCtx.fillStyle = `hsl(${hue}, 20%, 75%)`;
            tCtx.beginPath(); tCtx.arc(540, 720, 300, 0, Math.PI*2); tCtx.fill();

            tCtx.fillStyle = '#333333';
            tCtx.font = 'bold 60px sans-serif';
            tCtx.textAlign = 'center';
            tCtx.fillText(`Desain ${id}.png`, 540, 680);
            
            tCtx.font = '35px sans-serif';
            tCtx.fillStyle = '#666666';
            tCtx.fillText(`Simpan file asli dengan nama ${id}.png`, 540, 760);
            tCtx.fillText(`di folder yang sama dengan HTML ini.`, 540, 810);

            return tempCanvas.toDataURL();
        }

        // Jalankan saat web dimuat
        window.onload = () => {
            renderThumbnails();
            prosesRender();
        };
    </script>
</body>
</html>
