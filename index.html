<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Kartu Lebaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Konfigurasi Tailwind untuk Dark Mode berbasis class
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
        
        // Cek preferensi tema sebelumnya agar tidak berkedip saat dimuat
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        /* Smooth color transition for dark/light mode */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        #renderCanvas {
            display: none; /* Disembunyikan, hanya untuk proses gambar di latar belakang */
        }
        /* Custom styling untuk thumbnail aktif */
        .thumb-active {
            box-shadow: 0 0 0 3px #10b981; /* Emerald 500 */
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 flex flex-col">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 w-full backdrop-blur-md bg-white/80 dark:bg-slate-950/80 border-b border-slate-200 dark:border-slate-800 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center shadow-emerald-600/20 shadow-lg">
                        <i data-lucide="pen-tool" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="font-serif font-bold text-xl tracking-wide text-slate-900 dark:text-white">Lebaran<span class="text-emerald-600">Studio</span></span>
                </div>
                <!-- Theme Toggle Button -->
                <button id="themeToggle" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <i data-lucide="moon" id="moonIcon" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="sun" id="sunIcon" class="w-5 h-5 block dark:hidden"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Dual-Pane -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-8 flex flex-col lg:grid lg:grid-cols-12 gap-8 lg:gap-12 items-start pb-28 lg:pb-8">
        
        <!-- PANEL KIRI: EDITOR (Tools) -->
        <div class="w-full lg:col-span-5 flex flex-col gap-6 order-2 lg:order-1">
            
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-5 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                <h2 class="text-lg font-semibold flex items-center mb-6 text-slate-900 dark:text-white">
                    <i data-lucide="layout-template" class="w-5 h-5 mr-2.5 text-emerald-600"></i> Pilih Desain
                </h2>
                <!-- Thumbnail Gallery -->
                <div class="flex gap-4 overflow-x-auto hide-scrollbar pb-2" id="thumbnailContainer">
                    <!-- Thumbnail akan digenerate oleh JavaScript -->
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                <h2 class="text-lg font-semibold flex items-center mb-6 text-slate-900 dark:text-white">
                    <i data-lucide="move" class="w-5 h-5 mr-2.5 text-emerald-600"></i> Atur Posisi Teks
                </h2>
                <div class="space-y-5">
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Geser Kiri/Kanan</label>
                            <span id="valX" class="text-xs text-slate-500 font-mono">0</span>
                        </div>
                        <input type="range" id="sliderX" min="-50" max="50" value="0" class="w-full accent-emerald-600 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer dark:bg-slate-700">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Geser Atas/Bawah</label>
                            <span id="valY" class="text-xs text-slate-500 font-mono">0</span>
                        </div>
                        <input type="range" id="sliderY" min="-50" max="50" value="0" class="w-full accent-emerald-600 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer dark:bg-slate-700">
                    </div>
                    <button id="btnResetPosisi" class="w-full py-2.5 mt-2 text-sm text-emerald-600 dark:text-emerald-400 font-medium hover:bg-emerald-50 dark:hover:bg-slate-800 rounded-xl transition-colors border border-emerald-200 dark:border-slate-700">Kembalikan ke Tengah</button>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                <h2 class="text-lg font-semibold flex items-center mb-6 text-slate-900 dark:text-white">
                    <i data-lucide="type" class="w-5 h-5 mr-2.5 text-emerald-600"></i> Personalisasi Teks
                </h2>
                <!-- Form Input -->
                <div class="space-y-6">
                    <!-- Color Picker -->
                    <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-950 p-3 rounded-xl border border-slate-200 dark:border-slate-800">
                        <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Warna Teks</label>
                        <div class="flex items-center gap-3">
                            <span id="hexLabel" class="text-xs font-mono text-slate-500 uppercase">#0F3D3E</span>
                            <div class="relative w-8 h-8 rounded-full overflow-hidden border-2 border-slate-300 dark:border-slate-600 shadow-sm cursor-pointer hover:scale-105 transition-transform">
                                <input type="color" id="inputColor" value="#0f3d3e" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer">
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-medium text-slate-600 dark:text-slate-400">Nama Pengirim Utama</label>
                            
                            <!-- Tombol Skala Nama Utama -->
                            <div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-0.5 shadow-inner">
                                <button id="btnMinUtama" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-white dark:hover:bg-slate-700 shadow-sm text-slate-600 dark:text-slate-300 transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                <span id="valSizeUtama" class="text-xs font-semibold font-mono w-12 text-center text-emerald-600 dark:text-emerald-400">100%</span>
                                <button id="btnPlusUtama" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-white dark:hover:bg-slate-700 shadow-sm text-slate-600 dark:text-slate-300 transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                        <input type="text" id="inputNamaUtama" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white px-4 py-3.5 rounded-xl text-base font-semibold placeholder-slate-400 dark:placeholder-slate-600 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="Nama">
                    </div>
                    
                    <div class="pt-2 border-t border-slate-100 dark:border-slate-800/50">
                        <div class="flex items-center justify-between mb-2 mt-2">
                            <label class="block text-sm font-medium text-slate-600 dark:text-slate-400">Teks Pendukung / Keluarga</label>
                            
                            <!-- Tombol Skala Teks Sekunder -->
                            <div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-0.5 shadow-inner">
                                <button id="btnMinSekunder" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-white dark:hover:bg-slate-700 shadow-sm text-slate-600 dark:text-slate-300 transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                <span id="valSizeSekunder" class="text-xs font-semibold font-mono w-12 text-center text-emerald-600 dark:text-emerald-400">100%</span>
                                <button id="btnPlusSekunder" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-white dark:hover:bg-slate-700 shadow-sm text-slate-600 dark:text-slate-300 transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                        <input type="text" id="inputNamaSekunder" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white px-4 py-3.5 rounded-xl text-base placeholder-slate-400 dark:placeholder-slate-600 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="Keterangan">
                    </div>
                </div>
            </div>

        </div>

        <!-- PANEL KANAN: PREVIEW (Canvas) -->
        <div class="w-full lg:col-span-7 flex flex-col items-center relative lg:sticky lg:top-24 order-1 lg:order-2">
            
            <div class="w-full flex justify-between items-center mb-4 px-1 lg:px-2">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 mr-2 animate-pulse"></span> Pratinjau Langsung
                </span>
                <!-- Tombol Unduh Desktop -->
                <button onclick="unduhGambar()" class="hidden lg:flex bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold py-2.5 px-5 rounded-lg shadow-md transition-all items-center">
                    <i data-lucide="download" class="w-4 h-4 mr-2"></i> Unduh File
                </button>
            </div>

            <div class="relative w-full max-w-sm sm:max-w-md lg:max-w-[450px] aspect-[3/4] rounded-3xl lg:rounded-[2rem] overflow-hidden bg-slate-200 dark:bg-slate-800 border-4 lg:border-8 border-white dark:border-slate-900 shadow-xl lg:shadow-2xl transition-all">
                
                <!-- Loading Indicator -->
                <div id="loadingIndicator" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm hidden transition-all">
                    <i data-lucide="loader-circle" class="w-10 h-10 text-emerald-600 animate-spin mb-3"></i>
                    <span class="text-sm font-medium text-slate-600 dark:text-slate-300">Menyusun gambar...</span>
                </div>
                
                <!-- Gambar Hasil Komposisi -->
                <img id="previewImage" src="" alt="Preview Kartu" class="w-full h-full object-cover transition-opacity duration-300">
                <canvas id="renderCanvas"></canvas>

            </div>
            
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-5 text-center max-w-sm hidden lg:block">
                Desain Anda tidak diunggah ke server. Semua proses dilakukan secara aman di dalam perangkat Anda.
            </p>
        </div>

    </main>

    <!-- Footer / Support Kreator -->
    <footer class="w-full pb-28 lg:pb-12 pt-8 flex flex-col items-center justify-center border-t border-slate-200 dark:border-slate-800 mt-auto transition-colors">
        <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-4">Dukung kreator:</p>
        <div class="flex flex-wrap items-center justify-center gap-3 px-4">
            <a href="https://www.instagram.com/_anasubaid/" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-6 py-2.5 text-sm font-semibold text-white transition-all bg-gradient-to-r from-purple-500 via-pink-500 to-orange-500 rounded-full hover:shadow-lg hover:shadow-pink-500/30 transform hover:-translate-y-1">
                <i data-lucide="instagram" class="w-4 h-4 mr-2"></i>
                Follow @_anasubaid
            </a>
            <a href="https://trakteer.id/m_anas_ubaidillah/gift" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-6 py-2.5 text-sm font-semibold text-white transition-all bg-emerald-500 hover:bg-emerald-600 rounded-full hover:shadow-lg hover:shadow-emerald-500/30 transform hover:-translate-y-1">
                <i data-lucide="coffee" class="w-4 h-4 mr-2"></i>
                Buy me a coffee
            </a>
        </div>
    </footer>

    <!-- Mobile Fixed Action Bar -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 dark:bg-slate-950/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 lg:hidden z-50 transition-colors">
        <button onclick="unduhGambar()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-emerald-600/20 transition-all flex items-center justify-center">
            <i data-lucide="download" class="w-5 h-5 mr-2"></i> Simpan Gambar ke HP
        </button>
    </div>

    <script>
        // Inisialisasi Icon
        lucide.createIcons();

        // ---------------------------------------------------------
        // LOGIKA THEME TOGGLE (LIGHT / DARK MODE)
        // ---------------------------------------------------------
        const themeToggleBtn = document.getElementById('themeToggle');
        
        themeToggleBtn.addEventListener('click', () => {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });

        // ---------------------------------------------------------
        // KONFIGURASI TEMPLAT (Koordinat Teks per Gambar)
        // ---------------------------------------------------------
        const templates = [
            { 
                id: 1, 
                file: '1.jpg', 
                boxCenterY: 0.842, // Dikalibrasi tepat ke tengah kotak
                fontUtama: '"Plus Jakarta Sans", Helvetica, sans-serif',
                fontSekunder: '"Plus Jakarta Sans", Helvetica, sans-serif',
                sizeUtamaMult: 0.075, 
                sizeSekunderMult: 0.030,
                lineSpacing: 0.015, // Jarak antar baris dirapatkan
                color: '#0f3d3e' 
            },
            { 
                id: 2, 
                file: '2.jpg', 
                boxCenterY: 0.865, // Dikalibrasi tepat ke tengah kotak
                fontUtama: '"Plus Jakarta Sans", Helvetica, sans-serif',
                fontSekunder: '"Plus Jakarta Sans", Helvetica, sans-serif',
                sizeUtamaMult: 0.065, 
                sizeSekunderMult: 0.026,
                lineSpacing: 0.015,
                color: '#1e3a8a' 
            },
            { 
                id: 3, 
                file: '3.jpg', 
                boxCenterY: 0.825, // Dikalibrasi tepat ke tengah kotak
                fontUtama: '"Plus Jakarta Sans", Helvetica, sans-serif',
                fontSekunder: '"Plus Jakarta Sans", Helvetica, sans-serif',
                sizeUtamaMult: 0.070, 
                sizeSekunderMult: 0.028,
                lineSpacing: 0.015,
                color: '#1e293b' 
            },
            { 
                id: 4, 
                file: '4.jpg', 
                boxCenterY: 0.840, // Titik tengah (sesuaikan jika perlu)
                fontUtama: '"Plus Jakarta Sans", Helvetica, sans-serif',
                fontSekunder: '"Plus Jakarta Sans", Helvetica, sans-serif',
                sizeUtamaMult: 0.070, 
                sizeSekunderMult: 0.028,
                lineSpacing: 0.015,
                color: '#0f3d3e' 
            },
            { 
                id: 5, 
                file: '5.jpg', 
                boxCenterY: 0.840, // Titik tengah (sesuaikan jika perlu)
                fontUtama: '"Plus Jakarta Sans", Helvetica, sans-serif',
                fontSekunder: '"Plus Jakarta Sans", Helvetica, sans-serif',
                sizeUtamaMult: 0.070, 
                sizeSekunderMult: 0.028,
                lineSpacing: 0.015,
                color: '#1e3a8a' 
            },
            { 
                id: 6, 
                file: '6.jpg', 
                boxCenterY: 0.840, // Titik tengah (sesuaikan jika perlu)
                fontUtama: '"Plus Jakarta Sans", Helvetica, sans-serif',
                fontSekunder: '"Plus Jakarta Sans", Helvetica, sans-serif',
                sizeUtamaMult: 0.070, 
                sizeSekunderMult: 0.028,
                lineSpacing: 0.015,
                color: '#1e293b' 
            },
            { 
                id: 7, 
                file: '7.jpg', 
                boxCenterY: 0.840, // Titik tengah (sesuaikan jika perlu)
                fontUtama: '"Plus Jakarta Sans", Helvetica, sans-serif',
                fontSekunder: '"Plus Jakarta Sans", Helvetica, sans-serif',
                sizeUtamaMult: 0.070, 
                sizeSekunderMult: 0.028,
                lineSpacing: 0.015,
                color: '#333333' 
            }
        ];

        // ---------------------------------------------------------
        // INISIALISASI VARIABEL & DOM
        // ---------------------------------------------------------
        let activeTemplateId = 1;
        const thumbnailContainer = document.getElementById('thumbnailContainer');
        const inputNamaUtama = document.getElementById('inputNamaUtama');
        const inputNamaSekunder = document.getElementById('inputNamaSekunder');
        const previewImage = document.getElementById('previewImage');
        const renderCanvas = document.getElementById('renderCanvas');
        const ctx = renderCanvas.getContext('2d');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Elemen Slider Posisi
        const sliderX = document.getElementById('sliderX');
        const sliderY = document.getElementById('sliderY');
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        const btnResetPosisi = document.getElementById('btnResetPosisi');

        // State & Elemen Warna dan Ukuran
        let customColor = null;
        const inputColor = document.getElementById('inputColor');
        const hexLabel = document.getElementById('hexLabel');

        let currentScaleUtama = 100;
        let currentScaleSekunder = 100;
        const btnMinUtama = document.getElementById('btnMinUtama');
        const btnPlusUtama = document.getElementById('btnPlusUtama');
        const btnMinSekunder = document.getElementById('btnMinSekunder');
        const btnPlusSekunder = document.getElementById('btnPlusSekunder');
        const valSizeUtama = document.getElementById('valSizeUtama');
        const valSizeSekunder = document.getElementById('valSizeSekunder');

        // Render otomatis saat user mengetik atau menggeser slider
        inputNamaUtama.addEventListener('input', () => prosesRender());
        inputNamaSekunder.addEventListener('input', () => prosesRender());

        sliderX.addEventListener('input', (e) => {
            valX.textContent = e.target.value > 0 ? `+${e.target.value}` : e.target.value;
            prosesRender();
        });

        sliderY.addEventListener('input', (e) => {
            valY.textContent = e.target.value > 0 ? `+${e.target.value}` : e.target.value;
            prosesRender();
        });

        // Warna Teks
        inputColor.addEventListener('input', (e) => {
            customColor = e.target.value;
            hexLabel.textContent = customColor;
            prosesRender();
        });

        // Fungsi Update Skala Teks (Per-kelipatan 5%)
        function updateScale(jenis, delta) {
            if (jenis === 'utama') {
                currentScaleUtama = Math.max(50, Math.min(150, currentScaleUtama + delta));
                valSizeUtama.textContent = `${currentScaleUtama}%`;
            } else {
                currentScaleSekunder = Math.max(50, Math.min(150, currentScaleSekunder + delta));
                valSizeSekunder.textContent = `${currentScaleSekunder}%`;
            }
            prosesRender();
        }

        btnMinUtama.addEventListener('click', () => updateScale('utama', -5));
        btnPlusUtama.addEventListener('click', () => updateScale('utama', 5));
        btnMinSekunder.addEventListener('click', () => updateScale('sekunder', -5));
        btnPlusSekunder.addEventListener('click', () => updateScale('sekunder', 5));

        btnResetPosisi.addEventListener('click', () => {
            sliderX.value = 0;
            sliderY.value = 0;
            valX.textContent = "0";
            valY.textContent = "0";
            
            // Reset ukuran & warna
            currentScaleUtama = 100;
            currentScaleSekunder = 100;
            valSizeUtama.textContent = "100%";
            valSizeSekunder.textContent = "100%";
            
            const activeConfig = templates.find(t => t.id === activeTemplateId);
            customColor = activeConfig.color;
            inputColor.value = customColor;
            hexLabel.textContent = customColor;
            
            prosesRender();
        });

        // ---------------------------------------------------------
        // RENDER UI THUMBNAILS
        // ---------------------------------------------------------
        function renderThumbnails() {
            thumbnailContainer.innerHTML = '';
            templates.forEach(tpl => {
                const isSelected = tpl.id === activeTemplateId;
                
                const wrapper = document.createElement('div');
                wrapper.className = `relative flex-shrink-0 cursor-pointer transition-all duration-300 rounded-xl ${isSelected ? 'thumb-active' : 'opacity-60 hover:opacity-100 hover:scale-105'}`;
                wrapper.onclick = () => {
                    activeTemplateId = tpl.id;
                    
                    // Kembalikan slider ke titik tengah setiap kali ganti desain
                    sliderX.value = 0;
                    sliderY.value = 0;
                    valX.textContent = "0";
                    valY.textContent = "0";

                    // Reset ukuran teks ke default 100%
                    currentScaleUtama = 100;
                    currentScaleSekunder = 100;
                    valSizeUtama.textContent = "100%";
                    valSizeSekunder.textContent = "100%";

                    // Reset dan Update Warna Teks sesuai desain yang dipilih
                    const activeConfig = templates.find(t => t.id === activeTemplateId);
                    customColor = activeConfig.color;
                    inputColor.value = customColor;
                    hexLabel.textContent = customColor;
                    
                    renderThumbnails(); 
                    prosesRender();     
                };

                const img = document.createElement('img');
                img.src = tpl.file;
                img.className = `w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 object-cover rounded-xl bg-slate-200 dark:bg-slate-800`;
                
                // Fallback jika file gambar tidak ditemukan
                img.onerror = function() {
                    this.src = buatGambarFallback(tpl.id);
                };

                wrapper.appendChild(img);
                thumbnailContainer.appendChild(wrapper);
            });
        }

        // ---------------------------------------------------------
        // PROSES RENDER CANVAS
        // ---------------------------------------------------------
        function prosesRender() {
            loadingIndicator.classList.remove('hidden');
            previewImage.style.opacity = '0.3';

            const activeConfig = templates.find(t => t.id === activeTemplateId);
            const img = new Image();
            img.crossOrigin = "Anonymous";
            
            img.onload = () => {
                renderCanvas.width = img.width;
                renderCanvas.height = img.height;
                const cw = renderCanvas.width;
                const ch = renderCanvas.height;

                ctx.clearRect(0, 0, cw, ch);
                ctx.drawImage(img, 0, 0, cw, ch);

                ctx.textAlign = 'center';
                ctx.fillStyle = customColor || activeConfig.color;

                const txtUtama = inputNamaUtama.value.trim();
                const txtSekunder = inputNamaSekunder.value.trim();

                // Faktor Skala dari State (100% = 1.0)
                const scaleUtama = currentScaleUtama / 100;
                const scaleSekunder = currentScaleSekunder / 100;

                // Hitung ukuran aktual berdasarkan lebar/tinggi gambar dikalikan skala
                const sizeUtama = Math.floor(cw * activeConfig.sizeUtamaMult * scaleUtama);
                const sizeSekunder = Math.floor(cw * activeConfig.sizeSekunderMult * scaleSekunder);
                const spacing = ch * activeConfig.lineSpacing;
                
                // Hitung Koordinat Dasar
                const baseCenterY = ch * activeConfig.boxCenterY;
                const baseCenterX = cw / 2;

                // Tambahkan Offset dari Slider (-50% sampai 50% dari dimensi kanvas)
                const offsetX = (parseFloat(sliderX.value) / 100) * (cw / 2);
                const offsetY = (parseFloat(sliderY.value) / 100) * (ch / 2);

                const finalX = baseCenterX + offsetX;
                const finalY = baseCenterY + offsetY;

                // Logika Penempatan Simetris Presisi (Vertical Centering)
                if (txtUtama && txtSekunder) {
                    // Hitung total tinggi blok teks agar bisa di-center sempurna di finalY
                    const totalHeight = sizeUtama + spacing + sizeSekunder;
                    const yUtama = finalY - (totalHeight / 2) + (sizeUtama / 2);
                    const ySekunder = finalY + (totalHeight / 2) - (sizeSekunder / 2);

                    ctx.font = `bold ${sizeUtama}px ${activeConfig.fontUtama}`;
                    ctx.textBaseline = 'middle';
                    ctx.fillText(txtUtama, finalX, yUtama);

                    ctx.font = `500 ${sizeSekunder}px ${activeConfig.fontSekunder}`;
                    ctx.textBaseline = 'middle';
                    ctx.fillText(txtSekunder, finalX, ySekunder); 
                } else if (txtUtama) {
                    // Jika hanya ada nama utama, letakkan persis di tengah
                    ctx.font = `bold ${sizeUtama}px ${activeConfig.fontUtama}`;
                    ctx.textBaseline = 'middle';
                    ctx.fillText(txtUtama, finalX, finalY);
                } else if (txtSekunder) {
                    // Jika hanya ada teks pendukung, letakkan persis di tengah
                    ctx.font = `500 ${sizeSekunder}px ${activeConfig.fontSekunder}`;
                    ctx.textBaseline = 'middle';
                    ctx.fillText(txtSekunder, finalX, finalY);
                }

                // Gunakan format JPEG (kualitas 90%) untuk preview agar lebih ringan di browser
                previewImage.src = renderCanvas.toDataURL('image/jpeg', 0.9);
                
                loadingIndicator.classList.add('hidden');
                previewImage.style.opacity = '1';
            };

            img.onerror = () => {
                img.src = buatGambarFallback(activeConfig.id);
            };

            img.src = activeConfig.file;
        }

        // ---------------------------------------------------------
        // FUNGSI DOWNLOAD
        // ---------------------------------------------------------
        function unduhGambar() {
            try {
                // Konversi menjadi Blob JPEG dengan kualitas tinggi (95%)
                renderCanvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const namaFile = inputNamaUtama.value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'kartu';
                    link.download = `Studio_Lebaran_${namaFile}.jpg`;
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 'image/jpeg', 0.95);
            } catch (err) {
                alert("Silakan ketuk dan tahan gambar untuk menyimpan secara manual.");
            }
        }

        // ---------------------------------------------------------
        // FUNGSI FALLBACK IMAGE (Hanya jalan jika file asli tidak ada)
        // ---------------------------------------------------------
        function buatGambarFallback(id) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 1080;
            tempCanvas.height = 1440; // Menyesuaikan rasio 3:4 yang umum
            const tCtx = tempCanvas.getContext('2d');
            
            const hue = (id * 45) % 360;
            tCtx.fillStyle = `hsl(${hue}, 15%, 85%)`; // Background terang
            tCtx.fillRect(0,0, 1080, 1440);
            
            tCtx.fillStyle = `hsl(${hue}, 20%, 75%)`;
            tCtx.beginPath(); tCtx.arc(540, 720, 300, 0, Math.PI*2); tCtx.fill();

            tCtx.fillStyle = '#333333';
            tCtx.font = 'bold 60px sans-serif';
            tCtx.textAlign = 'center';
            tCtx.fillText(`Desain ${id}.jpg`, 540, 680);
            
            tCtx.font = '35px sans-serif';
            tCtx.fillStyle = '#666666';
            tCtx.fillText(`Simpan file asli dengan nama ${id}.jpg`, 540, 760);
            tCtx.fillText(`di folder yang sama dengan HTML ini.`, 540, 810);

            return tempCanvas.toDataURL('image/jpeg', 0.8);
        }

        // Jalankan saat web dimuat
        window.onload = () => {
            renderThumbnails();
            prosesRender();
        };
    </script>
</body>
</html>
